                    --accent: #ff5c8a;
                    --accent2: #b44dff;
                    --accent3: #5ec5e8;

                    color:var(--text3); line-height:1.5;
                    border:1px solid rgba(255,255,255,0.05);
                }

            const cookieBanner = document.createElement('div');
            cookieBanner.className = 'cookie-banner';
            cookieBanner.id = 'cookieBanner';
            cookieBanner.innerHTML = `
                <p>🍪 We use cookies for analytics and ads. <a href="#" style="color:var(--accent3);">Learn more</a></p>
                <div class="cookie-btns">
                    <button class="cookie-btn reject" id="rejectAllBtn">Dismiss</button>
                    <button class="cookie-btn customize" id="openConsentModalBtn">Customize</button>
                </div>
            `;

            const consentOverlay = document.createElement('div');
            consentOverlay.className = 'consent-overlay';
            consentOverlay.id = 'consentOverlay';
            consentOverlay.innerHTML = `
                <div class="consent-modal">
                    <h3>Cookie Preferences</h3>
                    <p style="color:var(--text3); margin-bottom:1.5rem;">You can adjust your preferences here. Note that ads are already loaded.</p>
                    <div class="consent-option">
                        <div class="option-text"><strong>Necessary</strong></div>
                        <label class="toggle-switch"><input type="checkbox" checked disabled><span class="slider"></span></label>
                    </div>
                    <div class="consent-option">
                        <div class="option-text"><strong>Analytics</strong></div>
                        <label class="toggle-switch"><input type="checkbox" id="analyticsToggle"><span class="slider"></span></label>
                    </div>
                    <div class="consent-option">
                        <div class="option-text"><strong>Marketing</strong><small style="display:block; color:var(--text3);">Already active</small></div>
                        <label class="toggle-switch"><input type="checkbox" id="marketingToggle" checked disabled><span class="slider"></span></label>
                    </div>
                    <div style="display:flex; gap:0.8rem; justify-content:flex-end; margin-top:2rem;">
                        <button class="btn btn-outline" id="savePreferencesBtn">Save</button>
                    </div>
                </div>
            `;

            const cookieIcon = document.createElement('div');
            cookieIcon.className = 'cookie-settings-icon';
            cookieIcon.id = 'cookieSettingsIcon';
            cookieIcon.textContent = '🍪';

            root.append(
                nav, hero, adBanner1, featuresSection, adBanner2,
                servicesSection, aboutSection, workSection, contactSection, footer,
                cookieBanner, consentOverlay, cookieIcon
            );

            // Trigger AdSense
            try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}

            // Simple interaction
            window.addEventListener('scroll', () => nav.classList.toggle('scrolled', window.scrollY > 40), { passive:true });
            document.getElementById('hamburgerBtn').onclick = () => {
                document.getElementById('navLinks').classList.toggle('open');
            };
            cookieIcon.onclick = () => consentOverlay.classList.add('active');
            document.getElementById('openConsentModalBtn').onclick = () => consentOverlay.classList.add('active');
            document.getElementById('rejectAllBtn').onclick = () => cookieBanner.classList.add('hidden');
            document.getElementById('savePreferencesBtn').onclick = () => {
                consentOverlay.classList.remove('active');
                cookieBanner.classList.add('hidden');
            };
            consentOverlay.addEventListener('click', e => { if (e.target === consentOverlay) consentOverlay.classList.remove('active'); });
        })();
    </script>
</body>
</html>
